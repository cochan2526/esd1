<! DOCTYPE html >
<html lang ="en">
    <head>
        <meta charset ="utf-8">
        <meta name ="viewport" content ="width=device-width , initial-scale=1">
        <title> Temperature Stories </title>
        </head>
    <body>
        <h1> Temperature Stories </h1>
        <p>Enter a temperature in Celsius and generate a short story .</p>
        <form method ="get" action ="{% url "story_page" %}">
            <label for ="temp"> Temperature in Celsius </label>
            <input id="temp" name ="temp" value ="{{ temp }}" placeholder ="e.g. 12">
            <button type ="submit">Make story </button>
        </form>
        {% if error %}
        <p>{{ error }}</p>
        {% endif %}
        {% if story %}
        <h2> Generated story </h2>
        <p>{{ story }}</p>
        <form method ="post" action ="{% url 'save_story' %}">
            {% csrf_token %}
            <input type =" hidden" name ="temp" value ="{{ temp }}">
            <button type ="submit">Save story </button>
        </form>
        {% endif %}
        {% if stories %}
        <p>{{ stories }}</p>
        {% endif %}
    </body>
</html>
